<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#059669"/>
  
  <!-- Rounded corners background -->
  <rect width="512" height="512" fill="#059669" rx="60"/>
  
  <!-- Farmer icon (simplified farmer/person silhouette) -->
  <g transform="translate(128, 100)">
    <!-- Head -->
    <circle cx="64" cy="50" r="35" fill="#ffffff"/>
    
    <!-- Body -->
    <rect x="30" y="90" width="68" height="80" fill="#ffffff" rx="10"/>
    
    <!-- Left arm -->
    <rect x="-10" y="100" width="40" height="20" fill="#ffffff" rx="10"/>
    
    <!-- Right arm -->
    <rect x="150" y="100" width="40" height="20" fill="#ffffff" rx="10"/>
    
    <!-- Legs -->
    <rect x="35" y="180" width="18" height="70" fill="#ffffff" rx="9"/>
    <rect x="79" y="180" width="18" height="70" fill="#ffffff" rx="9"/>
  </g>
  
  <!-- Leaf accent (representing agriculture) -->
  <g transform="translate(280, 150)">
    <path d="M 0 0 Q 20 -30 30 -50 Q 10 -20 0 0" fill="#10b981" stroke="#ffffff" stroke-width="2"/>
    <path d="M 30 -50 Q 40 -40 50 -30" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="80" y="420" width="352" height="8" fill="#10b981" rx="4"/>
</svg>
